name: console projection boundary

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python tools/check-console-boundary.py
